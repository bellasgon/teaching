title: Seminar Course
description: Academic Seminar

# GitHub Pages:
# - user/organization site => baseurl: ""
# - project site (repo "teaching") => baseurl: "/teaching"
url: ""
baseurl: "/teaching"

theme: null
markdown: kramdown
permalink: pretty

# Logo exibida no topo da sidebar (adicione o arquivo em assets/images/)
course_logo: "/assets/images/jgu-logo.png"

# Modelo de navegação local (links da própria pasta/repositório).
course_navigation:
  main:
    - title: Home
      path: /
    - title: Schedule
      path: /schedule
    - title: Instructions
      path: /instructions
  weeks:
    - title: Week 1
      path: /seminars/week01
    - title: Week 2
      path: /seminars/week02
  readings:
    - title: Core
      path: /readings/core

defaults:
  - scope:
      path: ""
    values:
      layout: default
